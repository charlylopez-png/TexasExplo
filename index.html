<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TexasExplo · Flota</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8eaf0;
  --muted: #6b7280;
  --a3: #f97316;
  --a3-dim: rgba(249,115,22,0.15);
  --l6: #22c55e;
  --l6-dim: rgba(34,197,94,0.15);
  --del-mad: #a78bfa;
  --del-pv:  #38bdf8;
  --del-gal: #fb7185;
  --del-val: #fbbf24;
  --ok: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --kinto: #8b5cf6;
  --vwr: #06b6d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* HEADER */
header {
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex; align-items:center; gap:20px;
  height:56px; position:sticky; top:0; z-index:100;
}
.logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:22px; letter-spacing:2px; color:var(--text); text-transform:uppercase; }
.logo span { color:var(--a3); }
.tagline { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; border-left:1px solid var(--border2); padding-left:16px; }
nav { margin-left:auto; display:flex; gap:4px; }
nav button {
  background:none; border:none; color:var(--muted); font-family:'Barlow',sans-serif;
  font-size:13px; padding:6px 14px; cursor:pointer; border-radius:6px;
  transition:all .2s; letter-spacing:.3px;
}
nav button.active, nav button:hover { background:var(--bg3); color:var(--text); }
nav button.active { color:var(--a3); }

/* STATS BAR */
.stats-bar {
  display:flex; gap:1px; background:var(--border);
  border-bottom:1px solid var(--border);
}
.stat {
  flex:1; background:var(--bg2); padding:14px 20px;
  display:flex; flex-direction:column; gap:3px;
}
.stat-val { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:700; line-height:1; }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
.stat-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* TOOLBAR */
.toolbar {
  padding:12px 24px; display:flex; gap:12px; align-items:center;
  background:var(--bg2); border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.search-wrap { position:relative; flex:0 0 260px; }
.search-wrap input {
  width:100%; background:var(--bg3); border:1px solid var(--border2);
  color:var(--text); padding:8px 12px 8px 36px; border-radius:8px;
  font-family:'Barlow',sans-serif; font-size:13px; outline:none;
}
.search-wrap input:focus { border-color:rgba(255,255,255,0.25); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; pointer-events:none; }
.filter-rows { display:flex; flex-direction:column; gap:6px; flex:1; }
.filter-row { display:flex; align-items:center; gap:8px; }
.filter-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); min-width:28px; }
.filter-group { display:flex; gap:5px; flex-wrap:wrap; }
.filter-btn {
  padding:5px 12px; border-radius:6px; font-size:12px; font-family:'Barlow',sans-serif;
  border:1px solid var(--border2); background:var(--bg3); color:var(--muted);
  cursor:pointer; transition:all .15s; font-weight:500; letter-spacing:.3px;
}
.filter-btn:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }
.filter-btn.active { background:var(--bg3); color:var(--text); border-color:rgba(255,255,255,0.3); }
.filter-btn.prod.a3.active { background:var(--a3-dim); border-color:var(--a3); color:var(--a3); }
.filter-btn.prod.l6.active { background:var(--l6-dim); border-color:var(--l6); color:var(--l6); }
.filter-btn.del.active { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.3); color:var(--text); }
.filter-btn.del[data-del="MADRID"].active    { background:rgba(167,139,250,.12); border-color:var(--del-mad); color:var(--del-mad); }
.filter-btn.del[data-del="PAÍS VASCO"].active{ background:rgba(56,189,248,.12);  border-color:var(--del-pv);  color:var(--del-pv);  }
.filter-btn.del[data-del="GALICIA"].active   { background:rgba(251,113,133,.12); border-color:var(--del-gal); color:var(--del-gal); }
.filter-btn.del[data-del="LA CORUÑA"].active { background:rgba(251,113,133,.12); border-color:var(--del-gal); color:var(--del-gal); }
.filter-btn.del[data-del="VALENCIA"].active  { background:rgba(251,191,36,.12);  border-color:var(--del-val); color:var(--del-val); }
/* card accent */
.card-accent { height:3px; width:100%; }
.card-accent.a3  { background:var(--a3); }
.card-accent.l6  { background:var(--l6); }
.sep { width:1px; height:28px; background:var(--border); }
.add-btn {
  margin-left:auto; padding:8px 18px; background:var(--a3); color:#fff;
  border:none; border-radius:8px; font-family:'Barlow',sans-serif; font-weight:600;
  font-size:13px; cursor:pointer; transition:opacity .15s; white-space:nowrap;
}
.add-btn:hover { opacity:.85; }

/* GRID */
.grid-wrap { padding:20px 24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px; }

/* CARD */
.card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; cursor:pointer;
  transition:all .2s; position:relative;
}
.card:hover { border-color:var(--border2); transform:translateY(-1px); background:var(--bg3); }
.card-top {
  padding:14px 16px 10px;
  display:flex; justify-content:space-between; align-items:flex-start;
}
.card-id {
  font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
}
.prod-badge {
  font-size:10px; font-weight:700; padding:3px 8px; border-radius:4px;
  letter-spacing:.8px; text-transform:uppercase;
}
.prod-badge.a3 { background:var(--a3-dim); color:var(--a3); }
.prod-badge.l6 { background:var(--l6-dim); color:var(--l6); }
.card-model {
  padding:0 16px 4px;
  font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:600;
  line-height:1.2; color:var(--muted);
}
.card-plate {
  font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800;
  letter-spacing:2px; color:var(--text); display:block; padding:0 16px 10px;
}
.card-bottom {
  border-top:1px solid var(--border);
  padding:10px 16px;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.chip {
  font-size:11px; padding:3px 8px; border-radius:4px;
  border:1px solid var(--border); color:var(--muted);
  font-weight:500; letter-spacing:.3px;
}
.chip.kinto { border-color:rgba(139,92,246,.3); color:var(--kinto); background:rgba(139,92,246,.08); }
.chip.vwr { border-color:rgba(6,182,212,.3); color:var(--vwr); background:rgba(6,182,212,.08); }
.chip.del { border-color:var(--border2); color:var(--text); }
.incident-dot {
  width:7px; height:7px; border-radius:50%; margin-left:auto; flex-shrink:0;
}
.incident-dot.none { background:var(--ok); box-shadow:0 0 6px rgba(34,197,94,.5); }
.incident-dot.some { background:var(--warn); box-shadow:0 0 6px rgba(245,158,11,.5); }
.incident-dot.many { background:var(--danger); box-shadow:0 0 6px rgba(239,68,68,.5); }
.km-bar-wrap { padding:0 16px 12px; }
.km-label { font-size:11px; color:var(--muted); margin-bottom:4px; display:flex; justify-content:space-between; }
.km-bar { height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; }
.km-fill { height:100%; border-radius:2px; transition:width .4s; }
.no-results { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); font-size:15px; }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200;
  display:flex; align-items:flex-start; justify-content:center;
  padding:40px 20px; overflow-y:auto; opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border:1px solid var(--border2); border-radius:16px;
  width:100%; max-width:680px; overflow:hidden;
  transform:translateY(16px); transition:transform .2s;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-header {
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:flex-start;
}
.modal-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700; }
.modal-sub { font-size:13px; color:var(--muted); margin-top:2px; }
.close-btn {
  background:var(--bg3); border:1px solid var(--border); width:32px; height:32px;
  border-radius:8px; color:var(--muted); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .15s;
}
.close-btn:hover { color:var(--text); border-color:var(--border2); }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:20px; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.info-item { background:var(--bg3); border-radius:8px; padding:12px 14px; }
.info-item.full { grid-column:1/-1; }
.info-key { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
.info-val { font-size:14px; font-weight:500; }
.info-val.mono { font-family:'Barlow Condensed',sans-serif; font-size:16px; letter-spacing:1px; }
.section-title { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.incident-list { display:flex; flex-direction:column; gap:6px; }
.incident-item {
  background:var(--bg3); border-radius:8px; padding:10px 14px;
  border-left:3px solid var(--warn); font-size:13px; line-height:1.5;
}
.modal-actions { display:flex; gap:10px; padding:16px 24px; border-top:1px solid var(--border); }
.btn { padding:9px 20px; border-radius:8px; font-family:'Barlow',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; border:none; }
.btn-primary { background:var(--a3); color:#fff; }
.btn-primary:hover { opacity:.85; }
.btn-secondary { background:var(--bg3); border:1px solid var(--border2); color:var(--muted); }
.btn-secondary:hover { color:var(--text); border-color:rgba(255,255,255,.25); }
.btn-danger { background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); color:var(--danger); }
.btn-danger:hover { background:rgba(239,68,68,.25); }

/* EDIT FORM */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); }
.form-group input, .form-group select, .form-group textarea {
  background:var(--bg3); border:1px solid var(--border2); border-radius:8px;
  color:var(--text); padding:9px 12px; font-family:'Barlow',sans-serif; font-size:13px;
  outline:none; transition:border-color .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:rgba(255,255,255,.3); }
.form-group select option { background:var(--bg2); }
.form-group textarea { resize:vertical; min-height:70px; }

/* DELEGACION VIEW */
.del-section { margin-bottom:28px; }
.del-header {
  display:flex; align-items:center; gap:12px; margin-bottom:14px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
}
.del-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; }
.del-count { font-size:13px; color:var(--muted); }
.del-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
.del-mini {
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; cursor:pointer; transition:all .15s;
}
.del-mini:hover { border-color:var(--border2); }
.del-mini-id { font-size:10px; color:var(--muted); font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; }
.del-mini-model { font-size:14px; font-weight:500; margin:2px 0; }
.del-mini-plate { font-size:12px; color:var(--muted); font-family:'Barlow Condensed',sans-serif; letter-spacing:.8px; }

/* RESPONSIVE */
@media(max-width:600px) {
  .stats-bar { flex-wrap:wrap; }
  .stat { min-width:50%; }
  .info-grid { grid-template-columns:1fr; }
  .form-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Texas<span>Explo</span></div>
  <div class="tagline">Gestión de Flota · Mediapro</div>
  <nav>
    <button class="active" onclick="showView('fleet')">Flota</button>
    <button onclick="showView('delegaciones')">Delegaciones</button>
  </nav>
</header>

<div id="view-fleet">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar matrícula, modelo, ID..." oninput="renderGrid()">
    </div>
    <div class="filter-rows">
      <div class="filter-row">
        <span class="filter-label">Prod.</span>
        <div class="filter-group">
          <button class="filter-btn prod active" data-prod="all" onclick="setProd('all',this)">Todas</button>
          <button class="filter-btn prod a3" data-prod="A3" onclick="setProd('A3',this)">A3</button>
          <button class="filter-btn prod l6" data-prod="L6" onclick="setProd('L6',this)">La Sexta</button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Del.</span>
        <div class="filter-group">
          <button class="filter-btn del active" data-del="all" onclick="setDel('all',this)">Todas</button>
          <button class="filter-btn del" data-del="MADRID" onclick="setDel('MADRID',this)">Madrid</button>
          <button class="filter-btn del" data-del="PAÍS VASCO" onclick="setDel('PAÍS VASCO',this)">País Vasco</button>
          <button class="filter-btn del" data-del="GALICIA" onclick="setDel('GALICIA',this)">Galicia</button>
          <button class="filter-btn del" data-del="LA CORUÑA" onclick="setDel('LA CORUÑA',this)">La Coruña</button>
          <button class="filter-btn del" data-del="VALENCIA" onclick="setDel('VALENCIA',this)">Valencia</button>
        </div>
      </div>
    </div>
    <button class="add-btn" onclick="openAdd()">+ Añadir vehículo</button>
  </div>
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="view-delegaciones" style="display:none; padding:24px;">
  <div id="del-content"></div>
</div>

<!-- MODAL DETALLE / EDICIÓN -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="e=>e.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Detalle</div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

  };
});

function save() { localStorage.setItem('tx_vehicles', JSON.stringify(vehicles)); }

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return vehicles.filter(v => {
    const matchProd = filterProd === 'all' || v.prod === filterProd;
    const matchDel  = filterDel  === 'all' || v.del  === filterDel;
    const matchSearch = !q || v.id.toLowerCase().includes(q) || v.modelo.toLowerCase().includes(q) || v.matricula.toLowerCase().includes(q) || v.del.toLowerCase().includes(q);
    return matchProd && matchDel && matchSearch;
  });
}

  renderGrid();
}

  filterDel = f;
  document.querySelectorAll('.filter-btn.del').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

}

function kmColor(km) {
  if (km > 60000) return 'var(--danger)';
  if (km > 35000) return 'var(--warn)';
  return 'var(--ok)';
}
function kmPct(km) { return Math.min(100, (km / 80000) * 100); }

function delAccentColor(del) {
  const map = {'MADRID':'var(--del-mad)','PAÍS VASCO':'var(--del-pv)','GALICIA':'var(--del-gal)','LA CORUÑA':'var(--del-gal)','VALENCIA':'var(--del-val)'};
  return map[del] || 'var(--muted)';
}

function parseDate(s) {
  if (!s) return null;
  const [d,m,y] = s.split('/').map(Number);
  return new Date(y, m-1, d);
}
function calcKmAnual(v) {
  // Use fecha de alta as start reference, kmFecha as the reading date
  const start = parseDate(v.alta);
  const reading = parseDate(v.kmFecha);
  if (!start || !v.km) return null;
  const end = reading || new Date();
  const dias = (end - start) / (1000*60*60*24);
  if (dias < 30) return null;
  return Math.round((v.km / dias) * 365);
}

function incidentLevel(inc) {
  if (!inc || inc.length === 0) return 'none';
  if (inc.length >= 4) return 'many';
  return 'some';
}

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Vehículos</div><div class="stat-sub">${a3} A3 · ${l6} La Sexta</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--kinto)">${kinto}</div><div class="stat-label">Renting KINTO</div><div class="stat-sub">Toyota</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--vwr)">${vwr}</div><div class="stat-label">Renting VWR</div><div class="stat-sub">Seat</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--warn)">${conInc}</div><div class="stat-label">Con incidencias</div><div class="stat-sub">${vehicles.length - conInc} sin incidencias</div></div>
    <div class="stat"><div class="stat-val" style="font-size:20px">${costeTotal.toLocaleString('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:0})}</div><div class="stat-label">Coste mensual</div><div class="stat-sub">renting contrato</div></div>
  `;
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="no-results">No hay vehículos que coincidan con la búsqueda.</div>'; return; }
  grid.innerHTML = list.map(v => {
    const inc = v.incidencias || [];
    const lvl = incidentLevel(inc);
    const pct = kmPct(v.km);
    const color = kmColor(v.km);
    const delColor = delAccentColor(v.del);
    const kmAnual = calcKmAnual(v);
    return `
    <div class="card" onclick="openDetail('${v.id.replace(/'/g,"\\'")}')">
      <div class="card-accent ${v.prod==='A3'?'a3':'l6'}"></div>
      <div class="card-top">
        <div class="card-id">${v.id}</div>
        <div style="display:flex;gap:6px;align-items:center">
          <span style="width:8px;height:8px;border-radius:50%;background:${delColor};display:inline-block;flex-shrink:0"></span>
          <div class="prod-badge ${v.prod==='A3'?'a3':'l6'}">${v.prod==='L6'?'L6':v.prod}</div>
        </div>
      </div>
      <div class="card-plate">${v.matricula}</div>
      <div class="card-model">${v.modelo}</div>
      <div class="km-bar-wrap">
        <div class="km-label">
          <span style="color:${color};font-weight:600">${v.km.toLocaleString('es-ES')} km</span>
          <span>${kmAnual ? '~'+kmAnual.toLocaleString('es-ES')+' km/año' : v.del}</span>
        </div>
        <div class="km-bar"><div class="km-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>
      <div class="card-bottom">
        <span class="chip ${v.renting.toLowerCase()}">${v.renting}</span>
        ${v.coste ? `<span class="chip">${v.coste}€/mes</span>` : ''}
        <div class="incident-dot ${lvl}" title="${inc.length} incidencia(s)" style="margin-left:auto"></div>
      </div>
    </div>`;
  }).join('');
}

function renderDelegaciones() {
  const delegaciones = [...new Set(vehicles.map(v=>v.del))];
  const content = document.getElementById('del-content');
  content.innerHTML = delegaciones.map(del => {
    const veh = vehicles.filter(v=>v.del===del);
    const a3 = veh.filter(v=>v.prod==='A3');
    const l6 = veh.filter(v=>v.prod==='L6');
    return `
    <div class="del-section">
      <div class="del-header">
        <div class="del-name">${del}</div>
        <div class="del-count">${veh.length} vehículos · <span style="color:var(--a3)">${a3.length} A3</span> · <span style="color:var(--l6)">${l6.length} La Sexta</span></div>
        <span style="width:10px;height:10px;border-radius:50%;background:${delAccentColor(del)};display:inline-block;margin-left:auto"></span>
      </div>
      <div class="del-grid">
        ${veh.map(v=>`
        <div class="del-mini" onclick="openDetail('${v.id}')">
          <div class="del-mini-id">${v.id} <span class="prod-badge ${v.prod==='A3'?'a3':'l6'}" style="font-size:9px;padding:2px 5px">${v.prod==='L6'?'L6':v.prod}</span></div>
          <div class="del-mini-model">${v.modelo}</div>
          <div class="del-mini-plate">${v.matricula} · ${v.km.toLocaleString('es-ES')} km</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function showView(view) {
  document.getElementById('view-fleet').style.display = view==='fleet' ? '' : 'none';
  document.getElementById('view-delegaciones').style.display = view==='delegaciones' ? '' : 'none';
  document.querySelectorAll('nav button').forEach((b,i)=>{
    b.classList.toggle('active', (i===0&&view==='fleet')||(i===1&&view==='delegaciones'));
  });
  if (view==='delegaciones') renderDelegaciones();
}

function openDetail(id) {
  const v = vehicles.find(x=>x.id===id);
  if (!v) return;
  editingId = id;
  document.getElementById('modal-title').textContent = v.modelo;
  document.getElementById('modal-sub').textContent = `${v.id} · ${v.matricula} · ${v.del}`;
  const inc = v.incidencias || [];
  const kmAnual = calcKmAnual(v);
  const ruedas = v.ruedas || [];
  document.getElementById('modal-body').innerHTML = `
    <div class="info-grid">
      <div class="info-item"><div class="info-key">Matrícula</div><div class="info-val mono" style="font-size:20px;letter-spacing:2px">${v.matricula}</div></div>
      <div class="info-item"><div class="info-key">Modelo</div><div class="info-val">${v.modelo}</div></div>
      <div class="info-item"><div class="info-key">Delegación</div><div class="info-val" style="color:${delAccentColor(v.del)}">${v.del}</div></div>
      <div class="info-item"><div class="info-key">Producción</div><div class="info-val"><span class="prod-badge ${v.prod==='A3'?'a3':'l6'}">${v.prod==='L6'?'La Sexta':v.prod}</span></div></div>
      <div class="info-item"><div class="info-key">Kilómetros (lectura: ${v.kmFecha||'—'})</div><div class="info-val" style="color:${kmColor(v.km)}">${v.km.toLocaleString('es-ES')} km</div></div>
      <div class="info-item"><div class="info-key">Estimado anual</div><div class="info-val" style="font-weight:600">${kmAnual ? '~'+kmAnual.toLocaleString('es-ES')+' km/año' : '—'}<span style="font-size:11px;color:var(--muted);font-weight:400;margin-left:6px">desde alta ${v.alta||'?'}</span></div></div>
      <div class="info-item"><div class="info-key">Alta contrato</div><div class="info-val">${v.alta||'—'}</div></div>
      <div class="info-item"><div class="info-key">Baja contrato</div><div class="info-val">${v.baja||'—'}</div></div>
      <div class="info-item"><div class="info-key">Renting</div><div class="info-val"><span class="chip ${v.renting.toLowerCase()}">${v.renting}</span></div></div>
      <div class="info-item"><div class="info-key">Coste mensual</div><div class="info-val">${v.coste ? v.coste+'€' : '—'}</div></div>
      <div class="info-item"><div class="info-key">Tarjeta Solred</div><div class="info-val mono" style="font-size:12px">${v.solred}</div></div>
      <div class="info-item"><div class="info-key">VIAT</div><div class="info-val mono" style="font-size:12px">${v.viat}</div></div>
      ${v.notas ? `<div class="info-item full"><div class="info-key">Notas</div><div class="info-val">${v.notas}</div></div>` : ''}
    </div>
    <div>
      <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Cambios de ruedas (${ruedas.length})</span>
        <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="openAddRueda('${id}')">+ Añadir</button>
      </div>
      ${ruedas.length ? `<div class="incident-list">${ruedas.map((r,i)=>`
        <div class="incident-item" style="border-left-color:var(--l6);display:flex;justify-content:space-between;align-items:center">
          <span>🔧 ${r.fecha} — ${r.descripcion}</span>
          <button onclick="deleteRueda('${id}',${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 4px" title="Eliminar">✕</button>
        </div>`).join('')}</div>`
      : '<div style="color:var(--muted);font-size:13px;padding:8px 0">Sin cambios de ruedas registrados</div>'}
    </div>
    ${inc.length ? `
    <div>
      <div class="section-title">Incidencias (${inc.length})</div>
      <div class="incident-list">${inc.map(i=>`<div class="incident-item">${i}</div>`).join('')}</div>
    </div>` : '<div style="color:var(--muted);font-size:13px">Sin incidencias registradas ✓</div>'}
  `;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn btn-primary" onclick="openEdit('${id}')">Editar</button>
    <button class="btn btn-secondary" onclick="openAddIncident('${id}')">+ Incidencia</button>
    <button class="btn btn-danger" style="margin-left:auto" onclick="deleteVehicle('${id}')">Eliminar</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const v = vehicles.find(x=>x.id===id);
  document.getElementById('modal-title').textContent = 'Editar vehículo';
  document.getElementById('modal-sub').textContent = v.id;
  document.getElementById('modal-body').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label>ID / Código</label><input id="e-id" value="${v.id}"></div>
      <div class="form-group"><label>Matrícula</label><input id="e-mat" value="${v.matricula}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Modelo</label><input id="e-mod" value="${v.modelo}"></div>
      <div class="form-group"><label>Renting</label>
        <select id="e-rent"><option ${v.renting==='KINTO'?'selected':''}>KINTO</option><option ${v.renting==='VWR'?'selected':''}>VWR</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Delegación</label>
        <select id="e-del">
          ${['MADRID','PAÍS VASCO','GALICIA','LA CORUÑA','VALENCIA'].map(d=>`<option ${v.del===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Producción</label>
        <select id="e-prod"><option ${v.prod==='A3'?'selected':''} value="A3">Antena 3</option><option ${v.prod==='L6'?'selected':''} value="L6">La Sexta</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Kilómetros</label><input id="e-km" type="number" value="${v.km}"></div>
      <div class="form-group"><label>Fecha lectura km (dd/mm/aaaa)</label><input id="e-kmfecha" value="${v.kmFecha||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Alta contrato</label><input id="e-alta" value="${v.alta||''}" placeholder="dd/mm/aaaa"></div>
      <div class="form-group"><label>Baja contrato</label><input id="e-baja" value="${v.baja||''}" placeholder="dd/mm/aaaa"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Coste mensual (€)</label><input id="e-coste" type="number" value="${v.coste||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Solred</label><input id="e-sol" value="${v.solred}"></div>
      <div class="form-group"><label>VIAT</label><input id="e-viat" value="${v.viat}"></div>
    </div>
    <div class="form-group full"><label>Notas</label><textarea id="e-notas">${v.notas||''}</textarea></div>
  `;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn btn-primary" onclick="saveEdit('${id}')">Guardar</button>
    <button class="btn btn-secondary" onclick="openDetail('${id}')">Cancelar</button>
  `;
}

function saveEdit(id) {
  const v = vehicles.find(x=>x.id===id);
  v.id = document.getElementById('e-id').value;
  v.matricula = document.getElementById('e-mat').value;
  v.modelo = document.getElementById('e-mod').value;
  v.renting = document.getElementById('e-rent').value;
  v.del = document.getElementById('e-del').value;
  v.prod = document.getElementById('e-prod').value;
  v.km = parseInt(document.getElementById('e-km').value)||0;
  v.kmFecha = document.getElementById('e-kmfecha').value;
  if(document.getElementById('e-alta')) { v.alta = document.getElementById('e-alta').value; v.baja = document.getElementById('e-baja').value; }
  v.coste = parseFloat(document.getElementById('e-coste').value)||null;
  v.solred = document.getElementById('e-sol').value;
  v.viat = document.getElementById('e-viat').value;
  v.notas = document.getElementById('e-notas').value;
  save(); renderStats(); renderGrid(); openDetail(v.id);
}

function openAddIncident(id) {
  document.getElementById('modal-title').textContent = 'Nueva incidencia';
  document.getElementById('modal-sub').textContent = id;
  const today = new Date().toLocaleDateString('es-ES');
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group full">
      <label>Descripción de la incidencia</label>
      <textarea id="inc-text" style="min-height:100px" placeholder="${today} descripción de lo ocurrido...">${today} </textarea>
    </div>
  `;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn btn-primary" onclick="saveIncident('${id}')">Guardar incidencia</button>
    <button class="btn btn-secondary" onclick="openDetail('${id}')">Cancelar</button>
  `;
}

function saveIncident(id) {
  const text = document.getElementById('inc-text').value.trim();
  if (!text) return;
  const v = vehicles.find(x=>x.id===id);
  if (!v.incidencias) v.incidencias = [];
  v.incidencias.push(text);
  save(); renderStats(); renderGrid(); openDetail(id);
}

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nuevo vehículo';
  document.getElementById('modal-sub').textContent = '';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label>ID / Código</label><input id="e-id" placeholder="MA3-TC 5"></div>
      <div class="form-group"><label>Matrícula</label><input id="e-mat" placeholder="1234ABC"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Modelo</label><input id="e-mod" placeholder="Toyota Corolla"></div>
      <div class="form-group"><label>Renting</label>
        <select id="e-rent"><option>KINTO</option><option>VWR</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Delegación</label>
        <select id="e-del">${['MADRID','PAÍS VASCO','GALICIA','LA CORUÑA','VALENCIA'].map(d=>`<option>${d}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Producción</label>
        <select id="e-prod"><option value="A3">Antena 3</option><option value="L6">La Sexta</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Kilómetros</label><input id="e-km" type="number" placeholder="0"></div>
      <div class="form-group"><label>Coste mensual (€)</label><input id="e-coste" type="number" placeholder="391.27"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Solred</label><input id="e-sol" placeholder="7078 8359 ..."></div>
      <div class="form-group"><label>VIAT</label><input id="e-viat" placeholder="6279 9900 ..."></div>
    </div>
    <div class="form-group full"><label>Notas</label><textarea id="e-notas" placeholder="Observaciones..."></textarea></div>
  `;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn btn-primary" onclick="saveNew()">Añadir vehículo</button>
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function saveNew() {
  const v = {
    id: document.getElementById('e-id').value.trim(),
    matricula: document.getElementById('e-mat').value.trim(),
    modelo: document.getElementById('e-mod').value.trim(),
    renting: document.getElementById('e-rent').value,
    del: document.getElementById('e-del').value,
    prod: document.getElementById('e-prod').value,
    km: parseInt(document.getElementById('e-km').value)||0,
    coste: parseFloat(document.getElementById('e-coste').value)||null,
    solred: document.getElementById('e-sol').value.trim(),
    viat: document.getElementById('e-viat').value.trim(),
    notas: document.getElementById('e-notas').value.trim(),
    estado: 'operativo', incidencias: []
  };
  if (!v.id || !v.matricula) { alert('ID y matrícula son obligatorios'); return; }
  vehicles.push(v); save(); renderStats(); renderGrid(); closeModal();
}

function deleteVehicle(id) {
  if (!confirm(`¿Eliminar el vehículo ${id}? Esta acción no se puede deshacer.`)) return;
  vehicles = vehicles.filter(v=>v.id!==id);
  save(); renderStats(); renderGrid(); closeModal();
}

function openAddRueda(id) {
  const today = new Date().toLocaleDateString('es-ES');
  document.getElementById('modal-title').textContent = 'Cambio de ruedas';
  document.getElementById('modal-sub').textContent = id;
  document.getElementById('modal-body').innerHTML = `
    <div class="form-row">
      <div class="form-group"><label>Fecha</label><input id="r-fecha" value="${today}"></div>
      <div class="form-group"><label>Cantidad de ruedas</label>
        <select id="r-cant"><option value="1">1 rueda</option><option value="2" selected>2 ruedas</option><option value="4">4 ruedas</option></select>
      </div>
    </div>
    <div class="form-group full"><label>Descripción</label><textarea id="r-desc" placeholder="Ej: 2 ruedas delanteras - Autotreca Alcobendas"></textarea></div>
  `;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn btn-primary" onclick="saveRueda('${id}')">Guardar</button>
    <button class="btn btn-secondary" onclick="openDetail('${id}')">Cancelar</button>
  `;
}

function saveRueda(id) {
  const v = vehicles.find(x=>x.id===id);
  if (!v.ruedas) v.ruedas = [];
  const cant = document.getElementById('r-cant').value;
  const desc = document.getElementById('r-desc').value.trim();
  const fecha = document.getElementById('r-fecha').value;
  v.ruedas.push({ fecha, descripcion: desc || cant+' rueda(s)' });
  save(); openDetail(id);
}

function deleteRueda(id, idx) {
  const v = vehicles.find(x=>x.id===id);
  v.ruedas.splice(idx, 1);
  save(); openDetail(id);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
}

// INIT
renderStats();
renderGrid();
</script>
</body>
</html>
